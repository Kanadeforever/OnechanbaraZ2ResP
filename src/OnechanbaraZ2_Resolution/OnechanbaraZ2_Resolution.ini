; ============================================================
; OnechanbaraZ2_Resolution.ini
;
; 分辨率自定义配置文件
; 配合 OnechanbaraZ2_Resolution.asi 使用
; ============================================================

[Resolution]
; 目标宽度（默认 1920 = 1080p）
; 常见值: 1920 (1080p), 2560 (2K), 3840 (4K)
Width=1920

; 目标高度（默认 1080 = 1080p）
; 常见值: 1080 (1080p), 1440 (2K), 2160 (4K)
Height=1080

[DPI]
; 高 DPI 感知模式（默认启用）
; 防止 Windows 对游戏窗口的位图拉伸，让渲染与显示分辨率对应
;   0 = 禁用
;   1 = 系统 DPI 感知（Vista+）
;   2 = 每显示器 DPI 感知（Win8.1+，默认/推荐）
AwarenessMode=2

[Debug]
; 日志开关（日志文件与 ASI 同名，位于游戏目录）
;   0 = 关闭日志   1 = 开启日志（默认）
EnableLog=1
