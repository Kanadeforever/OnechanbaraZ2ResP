; ============================================================
; OnechanbaraZ2_SaveRedirect.ini
;
; 存档目录重定向配置文件
; 配合 OnechanbaraZ2_SaveRedirect.asi 使用
; ============================================================

[SaveRedirect]
; 存档目标路径（支持环境变量展开，如 %USERPROFILE%）
; 默认值：%USERPROFILE%\Saved Games\OnechanbaraZ2
;
; 也可以使用绝对路径，例如：
;   TargetPath=D:\MySaves\OnechanbaraZ2
;   TargetPath=C:\Users\Public\Documents\OnechanbaraZ2
TargetPath=%USERPROFILE%\Saved Games\OnechanbaraZ2
